# Nginx server block for app.akontec.pro (FDI Connect admin app)
# Place at: /etc/nginx/conf.d/app.akontec.pro.conf   (this VPS is AlmaLinux/RHEL — uses
#           conf.d, not Debian's sites-available/sites-enabled). Then: sudo nginx -t && sudo systemctl reload nginx
#
# This serves ONLY app.akontec.pro. It does not touch akontec.pro or any other
# vhost on this box.
#
# NOTE: This is the HTTP (port 80) block only. When you run
#       `certbot --nginx -d app.akontec.pro`, Certbot automatically injects the
#       SSL (443) block and an HTTP->HTTPS redirect. Leave that to certbot.

server {
    listen 80;
    listen [::]:80;
    server_name app.akontec.pro;

    # Path to the built static files (Vite output).
    root /var/www/app.akontec.pro/dist;
    index index.html;

    # SPA fallback: any unknown path serves index.html so client-side
    # routing (react-router) works on deep links / refreshes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the local FDI Connect API service (pm2 / port 4100).
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache hashed assets aggressively (filenames change on each build).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Do not cache the service worker or the HTML entry.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}

# Nginx server block for admin.thecorps.in
# Place at: /etc/nginx/sites-available/admin.thecorps.in
# Enable:   ln -s /etc/nginx/sites-available/admin.thecorps.in /etc/nginx/sites-enabled/
#
# NOTE: This is the HTTP (port 80) block only. When you run
#       `certbot --nginx -d admin.thecorps.in`, Certbot automatically
#       injects the SSL (443) block and an HTTP->HTTPS redirect. Leave that to certbot.

server {
    listen 80;
    listen [::]:80;
    server_name admin.thecorps.in;

    # Path to the built static files (Vite output).
    root /var/www/admin.thecorps.in/dist;
    index index.html;

    # SPA fallback: any unknown path serves index.html so client-side
    # routing (react-router) works on deep links / refreshes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively (filenames change on each build).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Do not cache the service worker or the HTML entry.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
